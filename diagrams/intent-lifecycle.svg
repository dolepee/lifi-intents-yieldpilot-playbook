<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">YieldPilot as a LI.FI Intent lifecycle</title>
  <desc id="desc">A diagram showing how a multi-step YieldPilot cross-chain yield move becomes a single solver-backed LI.FI intent.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1324"/>
      <stop offset="55%" stop-color="#102a3f"/>
      <stop offset="100%" stop-color="#0d1b16"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#17253a"/>
      <stop offset="100%" stop-color="#10251d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#8bd3ff"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1060" cy="90" r="190" fill="#86efac" opacity="0.07"/>
  <circle cx="170" cy="650" r="240" fill="#7dd3fc" opacity="0.08"/>

  <text x="72" y="78" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui" font-size="42" font-weight="800">
    YieldPilot v1 -> one LI.FI Intent
  </text>
  <text x="74" y="118" fill="#b6c7d6" font-family="Inter, ui-sans-serif, system-ui" font-size="20">
    Fixed output, solver-backed route, escrowed input, one order lifecycle.
  </text>

  <g filter="url(#shadow)">
    <rect x="70" y="175" width="210" height="170" rx="24" fill="url(#card)" stroke="#2f5f78"/>
    <text x="96" y="222" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui" font-size="24" font-weight="800">1. User intent</text>
    <text x="96" y="262" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui" font-size="17">"Deliver 100 USDC</text>
    <text x="96" y="286" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui" font-size="17">to the destination</text>
    <text x="96" y="310" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui" font-size="17">yield leg."</text>
  </g>

  <line x1="285" y1="260" x2="400" y2="260" stroke="#8bd3ff" stroke-width="4" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="405" y="175" width="230" height="170" rx="24" fill="url(#card)" stroke="#2f5f78"/>
    <text x="431" y="222" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui" font-size="24" font-weight="800">2. Solver quote</text>
    <text x="431" y="262" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui" font-size="17">Standing inventory</text>
    <text x="431" y="286" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui" font-size="17">returns required input</text>
    <text x="431" y="310" fill="#86efac" font-family="Inter, ui-sans-serif, system-ui" font-size="17" font-weight="700">100.37 USDC</text>
  </g>

  <line x1="640" y1="260" x2="755" y2="260" stroke="#8bd3ff" stroke-width="4" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="760" y="175" width="220" height="170" rx="24" fill="url(#card)" stroke="#2f5f78"/>
    <text x="786" y="222" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui" font-size="24" font-weight="800">3. Escrow open</text>
    <text x="786" y="262" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui" font-size="17">Approve / permit</text>
    <text x="786" y="286" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui" font-size="17">InputSettlerEscrow</text>
    <text x="786" y="310" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui" font-size="17">then emit Open</text>
  </g>

  <line x1="985" y1="260" x2="1100" y2="260" stroke="#8bd3ff" stroke-width="4" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="1100" y="175" width="120" height="170" rx="24" fill="url(#card)" stroke="#2f5f78"/>
    <text x="1126" y="222" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui" font-size="24" font-weight="800">4.</text>
    <text x="1126" y="255" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui" font-size="24" font-weight="800">Deliver</text>
    <text x="1126" y="292" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui" font-size="17">Delivered</text>
    <text x="1126" y="316" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui" font-size="17">Settled</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="90" y="430" width="500" height="180" rx="28" fill="#0b1627" stroke="#24465c"/>
    <text x="122" y="475" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui" font-size="24" font-weight="800">Before: YieldPilot v1</text>
    <text x="122" y="516" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui" font-size="18">Bridge -> swap -> deposit / yield</text>
    <text x="122" y="548" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui" font-size="18">User signs each step and tracks each tx.</text>
    <text x="122" y="580" fill="#fca5a5" font-family="Inter, ui-sans-serif, system-ui" font-size="18" font-weight="700">Intermediate exposure lives in the app.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="690" y="430" width="500" height="180" rx="28" fill="#0b1f1a" stroke="#2d6654"/>
    <text x="722" y="475" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui" font-size="24" font-weight="800">After: LI.FI Intents</text>
    <text x="722" y="516" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui" font-size="18">Express desired output once.</text>
    <text x="722" y="548" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui" font-size="18">Solver handles the execution path.</text>
    <text x="722" y="580" fill="#86efac" font-family="Inter, ui-sans-serif, system-ui" font-size="18" font-weight="700">Frontend tracks one orderId.</text>
  </g>

  <path d="M665 512 C720 460, 880 394, 1030 388" fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <path d="M908 382 L1030 388 L932 456" fill="none" stroke="#86efac" stroke-width="3" opacity="0.7"/>
  <text x="780" y="390" fill="#b6c7d6" font-family="Inter, ui-sans-serif, system-ui" font-size="16">
    Conceptual auction / solver inventory curve
  </text>
</svg>
